# ============================================================
# レントゲンカルテ テンプレート（xray_karte.yaml）
# ============================================================
# 【設計方針】
#   ブラウザ操作の手順はこのYAMLに定義し、
#   プログラム（template_engine.py / browser_actions.py）は
#   汎用エンジンとして使う。
#   → 画面変更時はこのYAMLだけ修正すればOK！
#
# 【対応アクション】
#   click     : 要素をクリック
#   input     : テキスト入力（send_keys）
#   js_input  : JavaScript経由の入力（inputイベント発火、Homis必須）
#   select    : プルダウン選択
#   navigate  : URL遷移
#   wait      : 待機
#
# 【変数展開】
#   {変数名} はJSONデータの対応するキー値に自動置換される
#   例: {doctorName} → "山口 高秀"
#
# 【アラート対応】
#   confirm_alert: true       → アラート1回OK
#   confirm_alert_count: 2    → アラート2回OK（v1.4で追加）
#
# 【仕様書】docs/system_spec.md を参照
# ============================================================

name: レントゲンカルテ
description: レントゲン撮影後のカルテ作成（外来）
version: "1.4"

# 対象URL（変数展開あり）
target_url: "https://homis.jp/homic/?pid=patient_detail&patient_id={homisId}"

# 認証設定
auth:
  type: homis
  detect_login: true

# 操作ステップ
steps:
  - name: 新規ボタンをクリック
    action: click
    selector: "#karteNew"
    wait_after: 2000

  - name: 外来を選択
    action: click
    selector: "label"
    text_contains: "外来"
    wait_after: 1000

  - name: 指示医を選択
    action: select
    selector: "#doctor018"
    value: "{doctorName}"
    wait_after: 1000

  - name: 医科カルテボタンをクリック
    action: click
    selector_type: xpath
    selector: "//a[contains(text(), '医科カルテ')]"
    wait_after: 3000

  - name: 診察日を入力
    action: js_input
    selector: "#act_date"
    value: "{shootingDate}"
    wait_after: 500

  - name: 開始時間を入力
    action: input
    selector: "#start_time"
    value: "{shootingTime}"
    wait_after: 500

  - name: 終了時間を入力
    action: input
    selector: "#end_time"
    value: "{shootingTimeEnd}"
    wait_after: 2000

  - name: S欄に入力
    action: js_input
    selector: "textarea#subjective"
    value: "{sContent}"
    wait_after: 2000

  - name: A/P Summary欄に入力
    action: js_input
    selector: "textarea#ap"
    value: "{apContent}"
    wait_after: 2000

  - name: 指導内容に全角スペースを入力
    description: 指導内容が空だと完了時にエラーになるため全角スペースを入力
    action: js_input
    selector: "textarea#report"
    value: "\u3000"
    wait_after: 1000

  - name: 完了ボタンで保存
    action: click
    selector: "#karteCompletion"
    confirm_alert_count: 2
    wait_after: 5000

# 完了後の処理
on_complete:
  - name: リンクをコピー
    action: click
    selector_type: xpath
    selector: "//a[contains(@onclick, 'copyLinkOfKarte')]"
    wait_after: 1000

# 結果の取得
result:
  type: clipboard
  description: カルテURL
